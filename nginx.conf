worker_processes 1;
error_log /var/log/nginx/error.log info;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

# HTTP proxy for UI paths (optional)
http {
  include /etc/nginx/sites-enabled/*;
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" cookie:"$http_cookie" '
                      'upstream_status:$upstream_status upstream_ct:"$upstream_http_content_type"';
  access_log /var/log/nginx/access.log detailed;

  server {
    listen 80;
    server_name _;

    location / {
      return 200 "Nginx TCP/HTTP proxy for Arrs. Use the TCP stream ports for UIs.\n";
    }
  }

  # qBittorrent WebUI HTTP proxy
  server {
    listen 8081;
    server_name _;

    # Serve the login page and static assets without forwarding any
    # potentially stale session cookies from the browser. Stale SID
    # cookies forwarded to qBittorrent can cause it to return 401 for
    # resources and for the login POST. We only strip cookies for the
    # login flow and static assets; other API endpoints will continue
    # to receive cookies so authenticated calls still work.

    # Static assets (css, scripts, images) should be accessible before auth
    location ~ ^/(css|scripts|images)/ {
      proxy_pass http://warp:8080$request_uri;
      # Ensure qBittorrent sees the host it listens on inside the container
      proxy_set_header Host localhost:8080;
      # Set Origin and Referer to match the Host for CSRF validation
      proxy_set_header Origin "http://localhost:8080";
      proxy_set_header Referer "http://localhost:8080/";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_http_version 1.1;
    }

    # Authentication endpoint: don't pass browser cookies (avoids stale SID)
    location = /api/v2/auth/login {
      proxy_set_header Cookie "";
      proxy_pass http://warp:8080/api/v2/auth/login;
      # Force Host to the upstream address so qBittorrent treats the
      # request as coming to its internal interface and won't reject it
      # due to host/domain checks.
      proxy_set_header Host localhost:8080;
      # Set Origin to match the Host for CSRF validation
      proxy_set_header Origin "http://localhost:8080";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_http_version 1.1;
    }

    # Serve the root login page without forwarding any browser cookies. This
    # prevents stale session cookies from causing qBittorrent to return 401
    # for the login page.
    location = / {
      proxy_pass http://warp:8080/;
      proxy_set_header Host localhost:8080;
      proxy_set_header Origin "http://localhost:8080";
      proxy_set_header Referer "http://localhost:8080/";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_http_version 1.1;
    }

    # Serve any HTML pages (e.g. /index.html) without forwarding cookies so
    # the initial page loads even if the browser has a stale SID cookie.
    location ~* \.html$ {
      proxy_set_header Cookie "";
      proxy_pass http://warp:8080$request_uri;
      proxy_set_header Host localhost:8080;
      proxy_set_header Origin "http://localhost:8080";
      proxy_set_header Referer "http://localhost:8080/";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_http_version 1.1;
    }

    # All other paths (including API calls after login) should forward cookies
    location ^~ /api/v2/ {
      proxy_pass http://warp:8080$request_uri;
      proxy_set_header Host localhost:8080;
      proxy_set_header Cookie $http_cookie;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_http_version 1.1;
    }

    location / {
      proxy_pass http://warp:8080/;
      proxy_set_header Host localhost:8080;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_http_version 1.1;
    }
  }

}
# Stream module for raw TCP proxying
stream {
  log_format basic '$remote_addr [$time_local] $protocol $status $bytes_sent $bytes_received "$upstream_addr"';
  access_log /var/log/nginx/stream_access.log basic;

  upstream sonarr_up {
    server warp:8989;
  }

  upstream radarr_up {
    server warp:7878;
  }

  upstream lidarr_up {
    server warp:8686;
  }

  upstream bazarr_up {
    server warp:6767;
  }

  # readarr upstream removed

  upstream flaresolverr_up {
    server warp:8191;
  }

  # squid_up removed: local squid proxy service has been removed from
  # docker-compose. If you add a different proxy (privoxy/tinyproxy), add
  # a corresponding upstream here, e.g. `server warp:PORT;`.

  upstream prowlarr_up {
    server warp:9696;
  }

  upstream jellyfin_up {
    server warp:8096;
  }

  upstream jellyseerr_up {
    server warp:5055;
  }

  upstream navidrome_up {
    server warp:4533;
  }

  upstream spotiflac_up {
    server warp:3001;
  }

  upstream qbittorrent_up {
    server warp:8080;
  }

  server {
    listen 8989;
    proxy_pass sonarr_up;
    proxy_protocol off;
  }

  server {
    listen 7878;
    proxy_pass radarr_up;
  }

  server {
    listen 8686;
    proxy_pass lidarr_up;
  }

  server {
    listen 6767;
    proxy_pass bazarr_up;
  }

  # readarr server removed

  server {
    listen 8191;
    proxy_pass flaresolverr_up;
  }

  # 3128 server removed (formerly proxying to squid_up). Remove this
  # listener only if you don't need a local HTTP proxy reachable on the

    # Removed: API forwarding location moved into the HTTP server (port 8081)
    # to allow header/cookie handling and to avoid placing `location` inside
    # the `stream` context which is not valid.
  # host. To re-enable, add an upstream and server block pointing to the
  # proxy listening port in the warp namespace.

  server {
    listen 9697;
    proxy_pass prowlarr_up;
  }

  server {
    listen 8096;
    proxy_pass jellyfin_up;
  }

  server {
    listen 5055;
    proxy_pass jellyseerr_up;
  }

  server {
    listen 4533;
    proxy_pass navidrome_up;
  }

  server {
    listen 3001;
    proxy_pass spotiflac_up;
  }

  # qBittorrent uses an HTTP-based WebUI. Using the stream (TCP) proxy can
  # cause the WebUI to respond with 401
  #curl -v http://192.168.0.180:7878/ for certain proxied requests because
  # HTTP headers and host rewriting aren't applied at the TCP layer. Replace
  # the stream proxy for qBittorrent with an HTTP proxy server (below).
}



