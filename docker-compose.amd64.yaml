# The Arrs Stack - youtube.com/@KLTechVideos
# Prowlarr - Sonarr - Radarr - Lidarr - Readarr
# version: "2.1"
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=501
      - PGID=20
      - TZ=Asia/Kolkata
      - WEBUI_PORT=8080
    ports:
      - "8080:8080"
      - "6881:6881"
    volumes:
      - ./data/qbittorrent:/config
      - /Users/ashutoshkrishnajha/Downloads/arr-downloads:/downloads
    restart: unless-stopped
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:nightly # Change to "latest" for stable
    container_name: prowlarr
    platform: linux/amd64
    environment:
      - PUID=501
      - PGID=20
      - TZ=Asia/Kolkata
    volumes:
      - ./data/prowlarr/config:/config
      - ./data/prowlarr/backup:/data/Backup
      - /Users/ashutoshkrishnajha/Downloads/arr-downloads:/data/downloads
    ports:
      - 9697:9696
    restart: unless-stopped
    # networks:
    #   - arrs
  sonarr:
    image: lscr.io/linuxserver/sonarr:develop # Change to "latest" for stable
    container_name: sonarr
    platform: linux/amd64
    environment:
      - PUID=501
      - PGID=20
      - TZ=Asia/Kolkata
    volumes:
      - ./data/sonarr/config:/config
      - ./data/sonarr/backup:/data/Backup
      - ./data/sonarr/tvshows:/data/tvshows
      - /Users/ashutoshkrishnajha/Downloads/arr-downloads:/data/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
    # networks:
    #   - arrs
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    platform: linux/amd64
    environment:
      - PUID=501
      - PGID=20
      - TZ=Asia/Kolkata
    volumes:
      - ./data/radarr/config:/config
      - ./data/radarr/movies:/data/movies
      - /Users/ashutoshkrishnajha/Downloads/arr-downloads:/data/downloads
      - ./data/radarr/backup:/data/Backup
    ports:
      - 7878:7878
    restart: unless-stopped
    # networks:
    #   - arrs
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    platform: linux/amd64
    environment:
      - PUID=501
      - PGID=20
      - TZ=Asia/Kolkata
    volumes:
      - ./data/lidarr/config:/config
      - ./data/lidarr/music:/data/musicfolder
      - /Users/ashutoshkrishnajha/Downloads/arr-downloads:/data/downloads
      - ./data/lidarr/backup:/data/Backup
    ports:
      - 8686:8686
    restart: unless-stopped
    # networks:
    #   - arrs
  # readarr service removed (Readarr is no longer used).
  # Re-add this block if you decide to restore Readarr in the future.
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    platform: linux/amd64
    environment:
      - PUID=501
      - PGID=20
      - TZ=Asia/Kolkata
    volumes:
      - ./data/jellyfin/config:/config
      - /Users/ashutoshkrishnajha/Downloads/arr-downloads:/media
    ports:
      - 8096:8096
    restart: unless-stopped
